version: "2"

services:
  libfranka_u22.04_image:
    build:
      context: .
      dockerfile: Dockerfile
      
    image: libfranka_u22.04:0.10.0
    
    container_name: u22.04-libfranka 

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix    
      - /dev:/dev                        
      - ../docker_volume:/docker_volume 

    environment:
      - DISPLAY=$DISPLAY
      - TZ=Europe/London
    
    network_mode: host
    
    privileged: true

    cap_add:
      - SYS_NICE
    
    tty: true
